<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pids Tech — Meu Perfil</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
</head>

<body>

    <header class="header">
        <a class="header-logo" href="/">Pids<span>Tech</span></a>
        <div class="header-auth">
            <a href="/" class="btn btn-secondary btn-sm">← Voltar ao estoque</a>
        </div>
    </header>

    <div class="perfil-grid">

        <div class="form-card">
            <div class="form-card-header">
                <div class="form-card-titulo">Meus dados</div>
                <div class="form-card-subtitulo">Edite suas informações de perfil</div>
            </div>

            <div class="form-card-corpo">
                <div class="form-secao">
                    <div class="form-secao-titulo">Dados pessoais</div>
                    <div class="campo">
                        <label for="nome_completo">Nome completo *</label>
                        <input type="text" id="nome_completo" />
                    </div>
                    <div class="form-grid-2">
                        <div class="campo">
                            <label for="cpf">CPF *</label>
                            <input type="text" id="cpf" />
                        </div>
                        <div class="campo">
                            <label for="data_nasc">Data de nascimento *</label>
                            <input type="date" id="data_nasc" />
                        </div>
                    </div>
                    <div class="campo">
                        <label for="funcao">Função *</label>
                        <select id="funcao">
                            <option value="Técnico">Administrador</option>
                            <option value="Coordenador">Voluntário</option>
                        </select>
                    </div>
                </div>

                <div class="form-secao">
                    <div class="form-secao-titulo">Contato</div>
                    <div class="form-grid-2">
                        <div class="campo">
                            <label for="email_pessoal">E-mail *</label>
                            <input type="email" id="email_pessoal" />
                        </div>
                        <div class="campo">
                            <label for="telefone_celular">Telefone *</label>
                            <input type="text" id="telefone_celular" />
                        </div>
                    </div>
                </div>

                <div class="form-secao">
                    <div class="form-secao-titulo">Alterar senha</div>
                    <div class="campo">
                        <label for="nova_senha">Nova senha</label>
                        <input type="password" id="nova_senha" placeholder="Deixe em branco para não alterar" />
                    </div>
                </div>
            </div>

            <div class="form-rodape">
                <span id="mensagem-perfil" class="mensagem"></span>
                <div style="display:flex;gap:.5rem">
                    <button id="botao-excluir-conta" class="btn btn-danger btn-sm">Excluir conta</button>
                    <button id="botao-salvar-perfil" class="btn btn-primary">Salvar alterações</button>
                </div>
            </div>
        </div>

        <div class="form-card" id="card-voluntarios" style="display:none">
            <div class="form-card-header">
                <div class="form-card-titulo">Gerenciar voluntários</div>
                <div class="form-card-subtitulo">Voluntários cadastrados no sistema</div>
            </div>
            <div class="form-card-corpo">
                <div id="lista-voluntarios"></div>
            </div>
        </div>

    </div>

    <script src="{{ url_for('static', filename='perfil.js') }}"></script>
</body>

</html>
