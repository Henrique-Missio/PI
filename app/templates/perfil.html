<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pids Tech - Meu Perfil</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
</head>

<body>
    <header class="topo">
        <h1>Pids Tech</h1>
        <p class="subtitulo">Meu perfil</p>
        <div class="topo-acoes">
            <button onclick="window.location.href='/'" class="botao-secundario">Voltar</button>
        </div>
    </header>

    <main class="conteudo-centralizado">
        <div class="card-form">
            <h2>Meus dados</h2>
            <span id="mensagem-perfil" class="mensagem"></span>

            <div class="campo">
                <label for="nome_completo">Nome completo *</label>
                <input type="text" id="nome_completo" />
            </div>

            <div class="campo">
                <label for="cpf">CPF *</label>
                <input type="text" id="cpf" />
            </div>

            <div class="campo">
                <label for="data_nasc">Data de nascimento *</label>
                <input type="date" id="data_nasc" />
            </div>

            <div class="campo">
                <label for="funcao">Função *</label>
                <select id="funcao">
                    <option value="Técnico">Técnico</option>
                    <option value="Coordenador">Coordenador</option>
                    <option value="Suporte">Suporte</option>
                    <option value="Manutenção">Manutenção</option>
                </select>
            </div>

            <div class="campo">
                <label for="email_pessoal">E-mail *</label>
                <input type="email" id="email_pessoal" />
            </div>

            <div class="campo">
                <label for="telefone_celular">Telefone *</label>
                <input type="text" id="telefone_celular" />
            </div>

            <div class="campo">
                <label for="nova_senha">Nova senha</label>
                <input type="password" id="nova_senha" placeholder="Deixe em branco para não alterar" />
            </div>

            <div class="acoes-formulario">
                <button id="botao-salvar-perfil" class="botao-primario">Salvar alterações</button>
            </div>

            <hr style="margin: 1.5rem 0; border: none; border-top: 1px solid #eee;" />

            <button id="botao-excluir-conta" class="botao-excluir">Excluir minha conta</button>
        </div>

        <div class="card-form" id="card-voluntarios" style="display:none">
            <h2>Gerenciar voluntários</h2>
            <div id="lista-voluntarios"></div>
        </div>
    </main>

    <script src="{{ url_for('static', filename='perfil.js') }}"></script>
</body>

</html>
