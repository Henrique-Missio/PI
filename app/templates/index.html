<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pids Tech — Estoque</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
</head>

<body>

  <header class="header">
    <a class="header-logo" href="/">Pids<span>Tech</span></a>
    <div class="header-auth" id="area-auth"></div>
  </header>

  <div class="page-wrapper">
    <div class="page-topbar">
      <h1 class="page-title">Estoque</h1>
      <div class="page-actions" id="acoes-admin" style="display:none">
        <a href="cadastrar-aparelho.html" class="btn btn-secondary-dark">+ Aparelho</a>
        <a href="cadastrar-peca.html" class="btn btn-primary">+ Peça</a>
      </div>
    </div>

    <div class="filtros-card">
      <div class="filtro-grupo">
        <label>Categoria</label>
        <select id="f-categoria">
          <option value="">Todas</option>
          <option value="aparelho">Aparelho</option>
          <option value="peca">Peça</option>
        </select>
      </div>
      <div class="filtro-grupo">
        <label>Status</label>
        <select id="f-status">
          <option value="">Todos</option>
          <option value="Funcional">Funcional</option>
          <option value="Não funcional">Não funcional</option>
          <option value="Em conserto">Em conserto</option>
          <option value="Reservado">Reservado</option>
          <option value="Doado">Doado</option>
        </select>
      </div>
      <div class="filtro-grupo">
        <label>Nome</label>
        <input type="text" id="f-nome" placeholder="Buscar por nome..." />
      </div>
      <div class="filtro-grupo">
        <label>Marca</label>
        <input type="text" id="f-marca" placeholder="Buscar por marca..." />
      </div>
      <div class="filtro-grupo">
        <label>Data entrada (de)</label>
        <input type="date" id="f-data-de" />
      </div>
      <div class="filtro-grupo">
        <label>Data entrada (até)</label>
        <input type="date" id="f-data-ate" />
      </div>
      <div class="filtros-acoes">
        <button id="btn-limpar-filtros" class="btn btn-ghost btn-sm">Limpar</button>
      </div>
    </div>

    <div class="tabela-card">
      <div class="tabela-header">
        <span class="tabela-info"><strong id="contagem">0</strong> itens encontrados</span>
        <button id="btn-recarregar" class="btn btn-ghost btn-sm">↺ Atualizar</button>
      </div>
      <div class="tabela-wrapper">
        <table>
          <thead>
            <tr>
              <th>Categoria</th>
              <th>Nome</th>
              <th>Marca</th>
              <th>Status</th>
              <th>Data entrada</th>
              <th>Data saída</th>
            </tr>
          </thead>
          <tbody id="corpo-tabela"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Modal de detalhes/edição -->
  <div id="modal" class="modal-fundo">
    <div class="modal-caixa">
      <div class="modal-topo">
        <h2 class="modal-titulo" id="modal-titulo"></h2>
        <button class="modal-fechar-btn" id="modal-fechar">✕</button>
      </div>
      <div class="modal-corpo" id="modal-conteudo"></div>
      <div class="modal-rodape" id="modal-rodape">
        <button id="modal-editar" class="btn btn-secondary-dark">Editar</button>
        <button id="modal-excluir" class="btn btn-danger">Excluir</button>
      </div>
    </div>
  </div>

  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>

</html>
