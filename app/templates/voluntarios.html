<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pids Tech — Voluntários</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
</head>

<body>

    <header class="header">
        <a class="header-logo" href="/">Pids<span>Tech</span></a>
        <div class="header-auth">
            <a href="/" class="btn btn-secondary btn-sm">← Voltar ao estoque</a>
        </div>
    </header>

    <div class="page-wrapper">
        <div class="form-card" style="max-width: 700px; margin: 2rem auto;">
            <div class="form-card-header" style="display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:.5rem;">
                <div>
                    <div class="form-card-titulo">Gerenciar voluntários</div>
                    <div class="form-card-subtitulo">Voluntários cadastrados no sistema</div>
                </div>
                <button id="btn-novo-voluntario" class="btn btn-primary btn-sm">+ Novo voluntário</button>
            </div>
            <div class="form-card-corpo">
                <div id="lista-voluntarios"></div>
            </div>
        </div>
    </div>

    <!-- Modal novo voluntário -->
    <div class="modal-fundo" id="modal-voluntario" style="display:none;">
        <div class="modal-caixa" style="max-width:620px; max-height:90vh; overflow-y:auto;">
            <div class="modal-topo">
                <span class="modal-titulo">Novo voluntário</span>
                <button class="modal-fechar-btn" id="modal-fechar">✕</button>
            </div>
            <div class="modal-corpo" style="padding:1.5rem;">

                <div class="form-secao">
                    <div class="form-secao-titulo">Dados pessoais</div>
                    <div class="campo">
                        <label>Nome completo *</label>
                        <input type="text" id="m-nome" placeholder="Nome completo" />
                    </div>
                    <div class="form-grid-2">
                        <div class="campo">
                            <label>CPF *</label>
                            <input type="text" id="m-cpf" placeholder="000.000.000-00" />
                        </div>
                        <div class="campo">
                            <label>Data de nascimento *</label>
                            <input type="date" id="m-data-nasc" />
                        </div>
                    </div>
                    <div class="campo">
                        <label>Função *</label>
                        <select id="m-funcao">
                            <option value="" disabled selected>Selecione...</option>
                            <option value="Técnico">Técnico</option>
                            <option value="Coordenador">Coordenador</option>
                        </select>
                    </div>
                </div>

                <div class="form-secao">
                    <div class="form-secao-titulo">Contato</div>
                    <div class="form-grid-2">
                        <div class="campo">
                            <label>E-mail *</label>
                            <input type="email" id="m-email" placeholder="email@exemplo.com" />
                        </div>
                        <div class="campo">
                            <label>Telefone *</label>
                            <input type="text" id="m-telefone" placeholder="(00) 00000-0000" />
                        </div>
                    </div>
                </div>

                <div class="form-secao">
                    <div class="form-secao-titulo">Endereço</div>
                    <div class="form-grid-2">
                        <div class="campo">
                            <label>CEP *</label>
                            <input type="text" id="m-cep" placeholder="00000-000" />
                        </div>
                        <div class="campo">
                            <label>Número *</label>
                            <input type="text" id="m-numero" placeholder="Ex: 42" />
                        </div>
                    </div>
                    <div class="campo">
                        <label>Rua *</label>
                        <input type="text" id="m-rua" placeholder="Preenchido via CEP" readonly />
                    </div>
                    <div class="form-grid-2">
                        <div class="campo">
                            <label>Bairro *</label>
                            <input type="text" id="m-bairro" placeholder="Preenchido via CEP" readonly />
                        </div>
                        <div class="campo">
                            <label>Cidade *</label>
                            <input type="text" id="m-cidade" placeholder="Preenchida via CEP" readonly />
                        </div>
                    </div>
                    <div class="form-grid-2">
                        <div class="campo">
                            <label>Estado *</label>
                            <input type="text" id="m-estado" placeholder="UF" readonly />
                        </div>
                        <div class="campo">
                            <label>Complemento</label>
                            <input type="text" id="m-complemento" placeholder="Apto, bloco..." />
                        </div>
                    </div>
                </div>

                <div class="form-secao">
                    <div class="form-secao-titulo">Acesso</div>
                    <div class="form-grid-2">
                        <div class="campo">
                            <label>Senha *</label>
                            <input type="password" id="m-senha" placeholder="Mínimo 6 caracteres" />
                        </div>
                        <div class="campo">
                            <label>Confirmar senha *</label>
                            <input type="password" id="m-confirmar-senha" placeholder="Repita a senha" />
                        </div>
                    </div>
                </div>

            </div>
            <div class="modal-rodape" style="padding:1rem 1.5rem; display:flex; justify-content:space-between; align-items:center;">
                <span id="m-mensagem" class="mensagem"></span>
                <div style="display:flex; gap:.5rem;">
                    <button class="btn btn-secondary-dark btn-sm" id="modal-cancelar">Cancelar</button>
                    <button class="btn btn-primary btn-sm" id="modal-salvar">Cadastrar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='voluntarios.js') }}"></script>
</body>

</html>
