<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pids Tech - Cadastro</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
</head>

<body>
    <header class="topo">
        <h1>Pids Tech</h1>
        <p class="subtitulo">Crie sua conta</p>
        <div class="topo-acoes">
            <button onclick="window.location.href='/login'" class="botao-secundario">Login</button>
        </div>
    </header>

    <main class="conteudo-centralizado">
        <div class="card-form">
            <h2>Cadastro</h2>
            <span id="mensagem-cadastro" class="mensagem"></span>

            <!-- só aparece se for admin logado -->
            <div class="campo" id="campo-tipo-wrapper" style="display:none">
                <label for="tipo">Tipo de usuário *</label>
                <select id="tipo">
                    <option value="voluntario">Voluntário</option>
                    <option value="administrador">Administrador</option>
                </select>
            </div>

            <div class="campo">
                <label for="nome_completo">Nome completo *</label>
                <input type="text" id="nome_completo" placeholder="Seu nome completo" />
            </div>

            <div class="campo">
                <label for="cpf">CPF *</label>
                <input type="text" id="cpf" placeholder="Apenas números" />
            </div>

            <div class="campo">
                <label for="data_nasc">Data de nascimento *</label>
                <input type="date" id="data_nasc" />
            </div>

            <div class="campo">
                <label for="funcao">Função *</label>
                <select id="funcao">
                    <option value="" disabled selected>Selecione...</option>
                    <option value="Técnico">Administrador</option>
                    <option value="Voluntário">Voluntário</option>
                </select>
            </div>

            <div class="campo">
                <label for="email_pessoal">E-mail *</label>
                <input type="email" id="email_pessoal" placeholder="seu@email.com" />
            </div>

            <div class="campo">
                <label for="telefone_celular">Telefone *</label>
                <input type="text" id="telefone_celular" placeholder="Apenas números com DDD" />
            </div>

            <div class="campo">
                <label for="cep">CEP *</label>
                <input type="text" id="cep" placeholder="Apenas números" />
            </div>

            <div class="campo">
                <label for="rua">Rua *</label>
                <input type="text" id="rua" placeholder="Nome da rua" />
            </div>

            <div class="campo">
                <label for="numero">Número *</label>
                <input type="text" id="numero" placeholder="Ex: 342" />
            </div>

            <div class="campo">
                <label for="complemento">Complemento</label>
                <input type="text" id="complemento" placeholder="Ex: Apto 301, Bloco B..." />
            </div>

            <div class="campo">
                <label for="bairro">Bairro *</label>
                <input type="text" id="bairro" placeholder="Nome do bairro" />
            </div>

            <div class="campo">
                <label for="cidade">Cidade *</label>
                <input type="text" id="cidade" placeholder="Nome da cidade" />
            </div>

            <div class="campo">
                <label for="estado">Estado *</label>
                <input type="text" id="estado" placeholder="Ex: RS" maxlength="2" />
            </div>

            <div class="campo">
                <label for="senha">Senha *</label>
                <input type="password" id="senha" placeholder="Mínimo 6 caracteres" />
            </div>

            <div class="campo">
                <label for="confirmar_senha">Confirmar senha *</label>
                <input type="password" id="confirmar_senha" placeholder="Repita a senha" />
            </div>

            <div class="acoes-formulario">
                <button id="botao-cadastro" class="botao-primario">Cadastrar</button>
            </div>

            <p class="link-alternativo">
                Já tem conta? <a href="/login">Faça login</a>
            </p>
        </div>
    </main>

    <script src="{{ url_for('static', filename='cadastro.js') }}"></script>
</body>

</html>
