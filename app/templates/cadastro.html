<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pids Tech — Cadastro</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
</head>

<body>

    <header class="header">
        <a class="header-logo" href="/">Pids<span>Tech</span></a>
        <div class="header-auth">
            <a href="/login" class="btn btn-secondary btn-sm">Já tenho conta</a>
        </div>
    </header>

    <div class="form-page" style="max-width:700px">
        <div class="form-card">
            <div class="form-card-header">
                <div class="form-card-titulo">Criar conta</div>
                <div class="form-card-subtitulo">Preencha os dados para se cadastrar no Pids Tech</div>
            </div>

            <div class="form-card-corpo">

                <!-- Tipo (só admin vê) -->
                <div id="campo-tipo-wrapper" style="display:none" class="campo">
                    <label for="tipo">Tipo de usuário</label>
                    <select id="tipo">
                        <option value="voluntario">Voluntário</option>
                        <option value="administrador">Administrador</option>
                    </select>
                </div>

                <div class="form-secao">
                    <div class="form-secao-titulo">Dados pessoais</div>
                    <div class="campo">
                        <label for="nome_completo">Nome completo *</label>
                        <input type="text" id="nome_completo" placeholder="Seu nome completo" />
                    </div>
                    <div class="form-grid-2">
                        <div class="campo">
                            <label for="cpf">CPF *</label>
                            <input type="text" id="cpf" placeholder="000.000.000-00" />
                        </div>
                        <div class="campo">
                            <label for="data_nasc">Data de nascimento *</label>
                            <input type="date" id="data_nasc" />
                        </div>
                    </div>
                    <div class="campo">
                        <label for="funcao">Função *</label>
                        <select id="funcao">
                            <option value="" disabled selected>Selecione...</option>
                            <option value="Técnico">Administrador</option>
                            <option value="Coordenador">Voluntário</option>
                        </select>
                    </div>
                </div>

                <div class="form-secao">
                    <div class="form-secao-titulo">Contato</div>
                    <div class="form-grid-2">
                        <div class="campo">
                            <label for="email_pessoal">E-mail *</label>
                            <input type="email" id="email_pessoal" placeholder="seu@email.com" />
                        </div>
                        <div class="campo">
                            <label for="telefone_celular">Telefone *</label>
                            <input type="text" id="telefone_celular" placeholder="(00) 00000-0000" />
                        </div>
                    </div>
                </div>

                <div class="form-secao">
                    <div class="form-secao-titulo">Endereço</div>
                    <div class="form-grid-2">
                        <div class="campo">
                            <label for="cep">CEP *</label>
                            <input type="text" id="cep" placeholder="00000-000" />
                        </div>
                        <div class="campo">
                            <label for="numero">Número *</label>
                            <input type="text" id="numero" placeholder="Ex: 42" />
                        </div>
                    </div>
                    <div class="campo">
                        <label for="rua">Rua *</label>
                        <input type="text" id="rua" placeholder="Preenchido automaticamente" readonly />
                    </div>
                    <div class="form-grid-2">
                        <div class="campo">
                            <label for="bairro">Bairro *</label>
                            <input type="text" id="bairro" placeholder="Preenchido automaticamente" readonly />
                        </div>
                        <div class="campo">
                            <label for="cidade">Cidade *</label>
                            <input type="text" id="cidade" placeholder="Preenchida automaticamente" readonly />
                        </div>
                    </div>
                    <div class="form-grid-2">
                        <div class="campo">
                            <label for="estado">Estado *</label>
                            <input type="text" id="estado" placeholder="UF" readonly />
                        </div>
                        <div class="campo">
                            <label for="complemento">Complemento</label>
                            <input type="text" id="complemento" placeholder="Apto, bloco..." />
                        </div>
                    </div>
                </div>

                <div class="form-secao">
                    <div class="form-secao-titulo">Acesso</div>
                    <div class="form-grid-2">
                        <div class="campo">
                            <label for="senha">Senha *</label>
                            <input type="password" id="senha" placeholder="Mínimo 6 caracteres" />
                        </div>
                        <div class="campo">
                            <label for="confirmar_senha">Confirmar senha *</label>
                            <input type="password" id="confirmar_senha" placeholder="Repita a senha" />
                        </div>
                    </div>
                </div>

            </div>

            <div class="form-rodape">
                <span id="mensagem-cadastro" class="mensagem"></span>
                <button id="botao-cadastro" class="btn btn-primary">Criar conta</button>
            </div>
        </div>

        <p style="text-align:center;margin-top:1rem;font-size:.85rem;color:var(--text-secondary)">
            Já tem conta? <a href="/login" style="color:var(--accent);font-weight:500;text-decoration:none">Faça
                login</a>
        </p>
    </div>

    <script src="{{ url_for('static', filename='cadastro.js') }}"></script>
</body>

</html>
